  embedded SAMPLE_WEEKLY when fetch fails (file:// double-click) or the file is absent.
  R5a: opponent-context line per row (implied total · spread · DvP rank) from §9's
  nullable enrichment. R5b: reads Data/usage-trends.json (§10) — trend arrows per row
  (joined via sleeper_id) + the "usage spikes" panel; absent file → empty-state, never invented.
  R7 (2026-06-05): reads Data/league-sidecar.json (§11) — opponent panel (their projected
  lineup vs mine, holes, bench depth), waiver-capital chip (faab|priority per the registry
  preset), spike waiver-pressure chips, league switcher when >1 league (ffhub.league).
  Owns ONE piece of state: the set weekly lineup (localStorage ffhub.lineup.{season}-W{N}).
  Never reads draft ranks or draft state; never writes the sidecar.
  Shared atoms injected between SHARED:JS markers by Skills/build-digest.py sync.
  Palette is its own (game-day green) — CSS deliberately not shared across surfaces.

<style>

    --warn:#d29922; --bad:#f85149; --edge:#a371f7; --link:#58a6ff;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}

  header{position:sticky;top:0;z-index:9;background:var(--panel);border-bottom:1px solid var(--rule);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}

  .wk{background:var(--accdim);color:#fff;border-radius:6px;padding:2px 10px;font-weight:700}
  .sample-badge{background:var(--warn);color:#1a1a1a;border-radius:6px;padding:2px 10px;font-weight:700;display:none}
  .hlinks{margin-left:auto;display:flex;gap:10px;font-size:12.5px}
  .fresh{width:100%;font-size:11.5px;color:var(--dim)}
  #alerts{display:flex;flex-direction:column;gap:6px;padding:10px 16px 0}
  .alert{border:1px solid var(--rule);border-left:4px solid var(--warn);background:var(--panel);border-radius:6px;padding:7px 12px;font-size:13px}
  .alert.bad{border-left-color:var(--bad)}
  .alert b{margin-right:6px}
  main{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(0,1fr);gap:14px;padding:14px 16px;max-width:1280px;margin:0 auto}

  section{background:var(--panel);border:1px solid var(--rule);border-radius:8px;overflow:hidden}

  button:hover{border-color:var(--acc)}

  .slot:hover{background:var(--card)}
  .slot.gap{background:rgba(248,81,73,.08)}
  .slot .tag{font-size:11px;font-weight:700;color:var(--dim);letter-spacing:.5px}
  .slot .who{min-width:0}
  .slot .who .nm{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .slot .who .sub{font-size:11.5px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .slot .proj{text-align:right;font-variant-numeric:tabular-nums;font-weight:700}
  .slot .proj .lbl{display:block;font-size:10px;color:var(--dim);font-weight:400}
  .slot .st{text-align:right;font-size:11px}
  .chip{display:inline-block;border-radius:5px;padding:1px 6px;font-size:10.5px;font-weight:700}
  .chip.ok{background:rgba(63,185,80,.15);color:var(--acc)}
  .chip.q{background:rgba(210,153,34,.18);color:var(--warn)}
  .chip.out{background:rgba(248,81,73,.18);color:var(--bad)}
  .chip.edge{background:rgba(163,113,247,.16);color:var(--edge)}
  .chip.bye{background:rgba(248,81,73,.18);color:var(--bad)}
  .chip.waiver{background:rgba(88,166,255,.14);color:var(--link)}
  .chip.rostered{background:rgba(147,163,154,.15);color:var(--dim)}
  .empty{color:var(--bad);font-weight:700}

  .swaplist .hint{font-size:11px;color:var(--dim);padding:2px 8px 6px}
  .rowline{display:flex;gap:10px;align-items:baseline;padding:7px 14px;border-bottom:1px solid var(--rule);font-size:13px}
  .rowline:last-child{border-bottom:none}

  .rowline .meta{color:var(--dim);font-size:11.5px}

  .hl{outline:2px solid var(--acc);outline-offset:-2px;border-radius:4px}

  footer{max-width:1280px;margin:0 auto;padding:6px 16px 26px;color:var(--dim);font-size:11.5px}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:0}

  .twocol>div:first-child{border-right:1px solid var(--rule)}

   _shared.js — canonical cross-surface helpers for the FF 2026 boards.

   This is the SINGLE SOURCE OF TRUTH for the key / lifecycle-flag / CSV-parse
   logic used by BOTH surfaces. Skills/build-digest.py injects this file verbatim

   NOTE: CSS is intentionally NOT shared — the two surfaces use different visual

/* Canonical player key, shared by both surfaces. Produces an identical string
   for a board player (p.Name/p.Position) and a digest player (CSV Name/Position),
   so sidecar joins line up across surfaces. */
function keyOf(name, pos){ return `${name}|${pos}`; }

/* Lifecycle-flag readers. Take a sidecar ENTRY (researchSidecar.players[key]),
   NOT a player object. edge = verified + still-unpriced (set/cleared by
   /edge-board-update on Verify/demote); hype = a verified hype-train claim. */
function scIsEdge(sc){ return !!(sc && sc.research_flags && sc.research_flags.edge); }
function scIsHype(sc){ return !!(sc && sc.research_flags && sc.research_flags.hype); }

/* Parse the canonical players CSV (Data/players.csv schema) into row objects,
   coercing numeric columns. Validation is non-fatal: missing required columns
   and unparseable numbers are logged via console.warn so the surface still
   renders with partial data. */
function parseCSV(text){
  const lines = text.trim().split(/\r?\n/);
  const headers = parseCSVLine(lines[0]);
  const REQUIRED = ["Name","Position","NFL_Team","Consensus_Rank","ADP","Bye_Week","Tier"];
  const missing = REQUIRED.filter(h => !headers.includes(h));
  if(missing.length) console.warn("parseCSV: missing required column(s): " + missing.join(", ") + ". Surface will render with partial data.");
  const INT_COLS = ["Consensus_Rank","Consensus_Pos_Rank","ESPN_Rank","ESPN_Pos_Rank","Bye_Week","Tier"];
  const FLOAT_COLS = ["ADP","Projection"];
  return lines.slice(1).map((line,idx) => {
    const vals = parseCSVLine(line);
    const row = {};
    headers.forEach((h,i) => row[h] = vals[i] || "");
    INT_COLS.forEach(k => { if(row[k]!==""){ const n = parseInt(row[k],10); if(isNaN(n)) console.warn(`parseCSV: row ${idx+2} (${row.Name||"?"}) — non-numeric ${k}: "${row[k]}"`); else row[k] = n; } });
    FLOAT_COLS.forEach(k => { if(row[k]!==""){ const n = parseFloat(row[k]); if(isNaN(n)) console.warn(`parseCSV: row ${idx+2} (${row.Name||"?"}) — non-numeric ${k}: "${row[k]}"`); else row[k] = n; } });
    return row;
  });
}
function parseCSVLine(line){
  const result = []; let cur = ""; let inQ = false;
  for(let i=0;i<line.length;i++){
    const c = line[i];
    if(c === '"'){ inQ = !inQ; continue; }
    if(c === ',' && !inQ){ result.push(cur); cur=""; continue; }
    cur += c;
  }
  result.push(cur);
  return result;
}
/* SHARED:JS:END */

/* ---------- hub logic (renders only — /weekly-lineup computes; §9 contract) ---------- */
const SLOTS = [
  {id:"QB",  tag:"QB",   pos:["QB"]},
  {id:"RB1", tag:"RB",   pos:["RB"]},
  {id:"RB2", tag:"RB",   pos:["RB"]},
  {id:"WR1", tag:"WR",   pos:["WR"]},
  {id:"WR2", tag:"WR",   pos:["WR"]},
  {id:"TE",  tag:"TE",   pos:["TE"]},
  {id:"FLEX",tag:"FLEX", pos:["RB","WR","TE"]},
  {id:"DST", tag:"D/ST", pos:["DST"]},
  {id:"K",   tag:"K",    pos:["K"]}
];
const OUT_STATUSES = ["O","IR","NA","Out"];
let DATA = null, TRENDS = null, LEAGUE = null, LEAGUE_ID = null, MODE = "", openSwap = null;

const esc = s => String(s==null?"":s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const stateKey = () => `ffhub.lineup.${DATA.season}-W${DATA.week}`;
const loadOverrides = () => { try{ return JSON.parse(localStorage.getItem(stateKey())) || {}; }catch(e){ return {}; } };
const saveOverrides = o => localStorage.setItem(stateKey(), JSON.stringify(o));

function entries(){
  return Object.entries(DATA.roster || {}).map(([k,v]) => {
    const [name,pos] = k.split("|");
    return Object.assign({key:k, name, pos}, v);
  });
}
const isOut = e => e.bye || OUT_STATUSES.includes(e.injury_status);
const isEdge = k => scIsEdge({research_flags:(DATA.research_flags||{})[k]});

function resolveLineup(){
  const ov = loadOverrides(); const used = new Set(); const lineup = {};
  // pass 1 — apply valid overrides (player exists, eligible, not used; null = forced empty)
  for(const s of SLOTS){
    if(!(s.id in ov)) continue;
    const k = ov[s.id];
    if(k === null){ lineup[s.id] = null; continue; }
    const e = DATA.roster[k];
    if(e && s.pos.includes(k.split("|")[1]) && !used.has(k)){ lineup[s.id] = k; used.add(k); }
  }
  // pass 2 — fill the rest from skill verdicts (start > flex > sit, then projection)
  const w = v => v==="start"?2 : v==="flex"?1 : 0;
  for(const s of SLOTS){
    if(s.id in lineup) continue;
    let c = entries().filter(e => s.pos.includes(e.pos) && !used.has(e.key) && !isOut(e));
    c.sort((a,b) => (w(b.verdict)-w(a.verdict)) || (b.weekly_projection||0)-(a.weekly_projection||0));
    if(s.id==="FLEX"){
      const fl = c.filter(e=>e.verdict==="flex");
      if(fl.length) c = fl.concat(c.filter(e=>e.verdict!=="flex"));
    }
    if(c.length){ lineup[s.id] = c[0].key; used.add(c[0].key); }
    else lineup[s.id] = null;
  }
  return lineup;
}

function statusChip(e){
  if(e.bye) return '<span class="chip bye">BYE</span>';
  if(OUT_STATUSES.includes(e.injury_status)) return `<span class="chip out">${esc(e.injury_status)}</span>`;
  if(e.injury_status && e.injury_status!=="Healthy") return `<span class="chip q">${esc(e.injury_status)}</span>`;
  return '<span class="chip ok">✓</span>';
}
const edgeBadge = k => isEdge(k) ? ' <span class="chip edge">⚡ edge</span>' : "";

/* R5a — opponent context line: implied team total · spread · opponent DvP rank.
   Nullable enrichment (§9): only non-null parts render; bye/null-opponent renders nothing. */
function oppCtx(e){
  if(e.opponent == null) return "";
  const bits = [];
  if(e.implied_total != null) bits.push(`impl ${e.implied_total}`);
  if(e.spread != null) bits.push(e.spread === 0 ? "PK" : (e.spread > 0 ? `+${e.spread}` : `${e.spread}`));
  if(e.opp_rank_vs_pos != null){
    const r = e.opp_rank_vs_pos, c = r <= 8 ? "delta-pos" : (r >= 25 ? "delta-neg" : "");
    bits.push(`<span class="${c}">DvP ${r}</span>`);
  }
  return bits.length ? ` <span class="ctx" title="implied team total · spread (− = favored) · opponent rank vs position (1 = easiest)">${bits.join(" · ")}</span>` : "";
}

/* R5b — usage-trend arrow per player row, joined to usage-trends.json (§10) via sleeper_id.
   ▲ spike · ↗ leaning up (≥ half threshold) · ↘ leaning down (≤ −threshold) · nothing = steady/no data. */
function trendArrow(e){
  const t = TRENDS && e.sleeper_id ? (TRENDS.players || {})[String(e.sleeper_id)] : null;
  if(!t || !t.deltas) return "";
  const d = t.deltas, th = TRENDS.thresholds || {snap_pct:8, tgt_share:5, carry_share:7};
  const F = ["snap_pct","tgt_share","carry_share"], L = {snap_pct:"snap", tgt_share:"tgt", carry_share:"carry"};
  const parts = F.filter(f => d[f] != null).map(f => `${L[f]} ${d[f] > 0 ? "+" : ""}${d[f]}`);
  if(!parts.length) return "";
  const title = `usage WoW through W${TRENDS.week}: ${parts.join(" · ")}` + (t.spike ? ` — SPIKE (${t.spike.from_to})` : "");
  const up = F.some(f => d[f] != null && d[f] >= th[f] / 2);
  const dn = F.some(f => d[f] != null && -d[f] >= th[f]);
  let cls = "", sym = "";
  if(t.spike){ cls = "up2"; sym = "▲"; }
  else if(up && !dn){ cls = "up"; sym = "↗"; }
  else if(dn && !up){ cls = "dn"; sym = "↘"; }
  else return "";
  return ` <span class="trend ${cls}" title="${esc(title)}">${sym}</span>`;
}
const xlinks = name => {
  const q = encodeURIComponent(name);
  return `<span class="xl"><a href="draft-board.html?q=${q}">⤴ board</a> · <a href="research-digest.html?q=${q}">🔎 digest</a></span>`;
};

function renderLineup(){
  const lineup = resolveLineup(); const box = document.getElementById("lineup");
  box.innerHTML = SLOTS.map(s => {
    const k = lineup[s.id]; const e = k ? Object.assign({key:k,name:k.split("|")[0],pos:k.split("|")[1]}, DATA.roster[k]) : null;
    const gap = !e || isOut(e);
    let who, proj, st;
    if(e){
      who = `<div class="nm" data-name="${esc(e.name)}">${esc(e.name)}${edgeBadge(k)}${trendArrow(e)}</div>
             <div class="sub">${esc(e.team)} ${e.opponent ? (e.home?"vs ":"@ ")+esc(e.opponent) : "<b>BYE</b>"}${oppCtx(e)} · ${esc(e.matchup_note||"")} ${xlinks(e.name)}</div>`;
      proj = `${(e.weekly_projection??"–")}<span class="lbl">proj</span>`;
      st = statusChip(e);
    } else {
      who = `<div class="nm empty">EMPTY SLOT</div><div class="sub">no startable option — bench can't cover; see waivers</div>`;
      proj = "–"; st = '<span class="chip out">GAP</span>';
    }
    const open = openSwap === s.id ? renderSwap(s, lineup) : "";
    return `<div class="slot${gap?" gap":""}" data-slot="${s.id}">
      <span class="tag">${s.tag}</span><div class="who">${who}</div>
      <span class="proj">${proj}</span><span class="st">${st}</span>
    </div>${open}`;
  }).join("");
  box.querySelectorAll(".slot").forEach(el => el.addEventListener("click", ev => {
    if(ev.target.closest("a")) return;
    openSwap = openSwap === el.dataset.slot ? null : el.dataset.slot;
    renderAll(false);
  }));
  box.querySelectorAll(".swaplist .opt").forEach(el => el.addEventListener("click", ev => {
    ev.stopPropagation();
    const ov = loadOverrides();
    ov[el.dataset.forslot] = el.dataset.key === "" ? null : el.dataset.key;
    saveOverrides(ov); openSwap = null; renderAll(false);
  }));
  return lineup;
}

function renderSwap(s, lineup){
  const inSlots = new Set(Object.values(lineup).filter(Boolean));
  const cur = lineup[s.id];
  const c = entries().filter(e => s.pos.includes(e.pos) && e.key !== cur && !inSlots.has(e.key))
                     .sort((a,b)=>(b.weekly_projection||0)-(a.weekly_projection||0));
  const opts = c.map(e => `<div class="opt" data-forslot="${s.id}" data-key="${esc(e.key)}">
      <span>${esc(e.name)}${trendArrow(e)} <span class="meta">${esc(e.pos)} · ${e.opponent?(e.home?"vs ":"@ ")+esc(e.opponent):"BYE"}</span>${oppCtx(e)} ${statusChip(e)}</span>
      <span class="p">${e.weekly_projection??"–"}</span></div>`).join("");
  return `<div class="swaplist"><div class="hint">swap ${s.tag} → (saved to this device for Week ${DATA.week})</div>
    ${opts || '<div class="hint">no eligible bench option</div>'}
    <div class="opt" data-forslot="${s.id}" data-key=""><span class="meta">— leave empty —</span></div></div>`;
}

function renderFlex(lineup){

  const flexKey = lineup["FLEX"];

  const cands = entries().filter(e => ["RB","WR","TE"].includes(e.pos) && !inSlots.has(e.key))
                         .sort((a,b)=>(b.weekly_projection||0)-(a.weekly_projection||0)).slice(0,3);
  const cur = flexKey ? `<div class="rowline"><span class="nm">current: ${esc(flexKey.split("|")[0])}</span>

  document.getElementById("flexOpt").innerHTML = cur + (cands.map(e => {

      <span class="note">${esc(e.verdict_note||"")}</span></div>`;
  }).join("") || '<div class="rowline"><span class="meta">no contenders on the bench</span></div>');
}

/* ---------- R7 league context (§11) — renders only; refresh-league.py computes ---------- */
const STARTER_SLOTS = ["QB","RB","WR","TE","FLEX","DST","K"];
function curLeague(){
  if(!LEAGUE) return null;
  if(!LEAGUE_ID || !(LEAGUE.leagues||{})[LEAGUE_ID]){
    LEAGUE_ID = localStorage.getItem("ffhub.league");
    if(!LEAGUE_ID || !(LEAGUE.leagues||{})[LEAGUE_ID]) LEAGUE_ID = LEAGUE.default_league;
  }
  return (LEAGUE.leagues||{})[LEAGUE_ID] || null;
}
const lgTeam = (lg,id) => (lg.teams||[]).find(t => t.team_id === id) || null;
const starters = t => (t.roster||[]).filter(p => STARTER_SLOTS.includes(p.slot));
const projSum = list => {
  const known = list.filter(p => p.weekly_projection != null);
  return {sum:+known.reduce((a,p)=>a+p.weekly_projection,0).toFixed(1), known:known.length, of:list.length};
};
function myLineupTotal(lineup){
  let sum = 0, known = 0, of = 0;
  for(const k of Object.values(lineup)){ of++;
    const e = k ? DATA.roster[k] : null;
    if(e && e.weekly_projection != null){ sum += e.weekly_projection; known++; } }
  return {sum:+sum.toFixed(1), known, of};
}

function renderWaiverCapital(){

  }
  const budget = lg.faab_budget, rem = me ? me.faab_remaining : null;
  const rems = rivals.map(t => t.faab_remaining).filter(v => v != null).sort((a,b)=>a-b);
  const median = rems.length ? rems[Math.floor(rems.length/2)] : null;
  const top = rivals.filter(t => t.faab_remaining != null).sort((a,b)=>b.faab_remaining-a.faab_remaining)[0] || null;
  const canOutbid = rem != null ? rivals.filter(t => t.faab_remaining != null && t.faab_remaining > rem).length : null;
  chip.textContent = rem != null ? `FAAB $${rem}` : "";
  box.innerHTML =
    `<div class="caprow"><span class="big">${rem!=null?`$${rem}`:"$?"}</span><span class="meta">of $${budget!=null?budget:"?"} left</span>
      ${rem!=null&&budget?`<span class="capbar"><span class="capfill" style="width:${Math.max(0,Math.min(100,rem/budget*100))}%"></span></span>`:""}</div>` +
    `<div class="rowline"><span class="meta">league median (rivals): ${median!=null?"$"+median:"?"} · biggest stack: ${top?esc(top.name)+" $"+top.faab_remaining:"?"}${canOutbid!=null?` · ${canOutbid} can outbid me`:""}</span></div>` +
    '<div class="rowline"><span class="meta">log bids in <code>2026 Season/Data/waiver-log.csv</code> (§11) — it feeds the "what do spikes cost" calibration</span></div>';
}
/* spike waiver-pressure: rivals with an O/IR starter at the spiking position = likely claim competition */
function spikePressure(pos){
  const lg = curLeague();
  if(!lg) return "";
  const rivals = (lg.teams||[]).filter(t => t.team_id !== lg.my_team_id);
  const n = rivals.filter(t => starters(t).some(p => p.pos === pos && ["O","IR","NA"].includes(p.injury_status))).length;
  return n ? ` <span class="chip q" title="rivals with an O/IR starter at ${esc(pos)} — likely claim competition">${n} rival${n>1?"s":""} weak at ${esc(pos)}</span>` : "";
}

function renderAlerts(lineup){
  const box = document.getElementById("alerts"); const out = [];
  if(LEAGUE && !LEAGUE.sample && DATA && !DATA.sample && LEAGUE.week !== DATA.week)
    out.push({bad:false, label:"LEAGUE DATA STALE", note:`league sidecar is W${LEAGUE.week} but lineup is W${DATA.week} — rerun Skills/refresh-league.py`});
  // computed gaps first — loudest line on the card
  for(const s of SLOTS){
    const k = lineup[s.id];
    if(!k) out.push({bad:true, label:"EMPTY "+s.tag, note:"no startable option in the slot — fill from bench or waivers"});
    else { const e = DATA.roster[k];
      if(e.bye) out.push({bad:true, label:s.tag+" ON BYE", note:k.split("|")[0]+" is on bye in this slot"});
      else if(OUT_STATUSES.includes(e.injury_status)) out.push({bad:true, label:s.tag+" "+e.injury_status, note:k.split("|")[0]+" is "+e.injury_status+" and still slotted"});
    }
  }
  for(const a of (DATA.alerts||[])) out.push({bad:a.type==="inactive"||a.type==="empty-slot", label:(a.type||"").toUpperCase(), note:(a.subjects||[]).map(s=>s.split("|")[0]).join(", ")+" — "+(a.note||"")});
  box.innerHTML = out.map(a=>`<div class="alert${a.bad?" bad":""}"><b>${esc(a.label)}</b>${esc(a.note)}</div>`).join("");
}

function renderAll(scrollQ){
  const lineup = renderLineup();
  renderLeagueSel(); renderFlex(lineup); renderBench(lineup); renderStreaming(); renderWaivers();
  renderSpikes(); renderOpponent(lineup); renderWaiverCapital(); renderAlerts(lineup);
  document.getElementById("wk").textContent = `Week ${DATA.week} · ${DATA.season}`;
  document.getElementById("sampleBadge").style.display = DATA.sample ? "inline-block" : "none";
  const n = Object.keys(DATA.roster||{}).length;
  document.getElementById("fresh").textContent =
    `${n} roster players · generated ${DATA.generated} · status pulled ${(DATA.sources||{}).pulled_at||"?"} · data: ${MODE}` +
    ` · trends: ${TRENDS ? (TRENDS.sample ? "sample" : `usage through W${TRENDS.week}`) : "—"}` +
    ` · league: ${LEAGUE ? (LEAGUE.sample ? "sample" : `W${LEAGUE.week} pulled ${LEAGUE.generated}`) : "—"}` +
    (DATA.sample ? " · SAMPLE — not a real week" : "");
  document.getElementById("foot").innerHTML =
    `Hub renders only — <code>/weekly-lineup</code> computes and writes the sidecar (conventions §9). ` +
    `State on this device: manual slot overrides for Week ${DATA.week} only.`;
  if(scrollQ){
    const q = new URLSearchParams(location.search).get("q");
    if(q){ const el = [...document.querySelectorAll("[data-name]")].find(x => x.dataset.name.toLowerCase().includes(q.toLowerCase()));
      if(el){ const row = el.closest(".slot,.rowline"); if(row){ row.classList.add("hl"); row.scrollIntoView({block:"center"}); } } }
  }
}

function boot(data, mode){ DATA = data; MODE = mode; renderAll(true); }
document.getElementById("resetBtn").addEventListener("click", () => {
  localStorage.removeItem(stateKey()); openSwap = null; renderAll(false);
});
document.getElementById("leagueSel").addEventListener("change", ev => {
  LEAGUE_ID = ev.target.value; localStorage.setItem("ffhub.league", LEAGUE_ID); renderAll(false);
});

Promise.all([
  fetch("../Data/weekly-sidecar.json").then(r => { if(!r.ok) throw new Error(r.status); return r.json(); }).catch(() => null),
  fetch("../Data/usage-trends.json").then(r => { if(!r.ok) throw new Error(r.status); return r.json(); }).catch(() => null),
  fetch("../Data/league-sidecar.json").then(r => { if(!r.ok) throw new Error(r.status); return r.json(); }).catch(() => null)
]).then(([d, t, l]) => {
  if(d){ TRENDS = t; LEAGUE = l; boot(d, "live fetch"); } // live; trends/league null → empty-states
  else { TRENDS = SAMPLE_TRENDS; LEAGUE = SAMPLE_LEAGUE; boot(SAMPLE_WEEKLY, "embedded sample (fetch unavailable)"); }
});
</script>
